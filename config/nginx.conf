upstream streamlit {
    server app:8501;
}

upstream fastapi {
    server api:8000;
}

upstream rabbitmq_mgmt {
    server rabbitmq:15672;
}

server {
    listen 80;

    # FastAPI — /api/* is forwarded with the /api prefix stripped.
    # proxy_pass with a trailing slash performs the strip automatically.
    # --root-path /api in the FastAPI entrypoint makes OpenAPI docs generate
    # correct public URLs (e.g. http://localhost/api/docs).
    location /api/ {
        proxy_pass         http://fastapi/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /rabbitmq/ {
        proxy_pass         http://rabbitmq_mgmt/rabbitmq/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # Management UI uses chunked responses
        proxy_buffering    off;
    }

    # Streamlit — everything else.
    # WebSocket upgrade is required for Streamlit's live-reload connection.
    location / {
        proxy_pass         http://streamlit;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;  # keep WebSocket connections open
    }
}
